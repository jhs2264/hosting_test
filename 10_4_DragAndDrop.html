<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and drop - demo 3</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 7px;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      background: #fff;
      font-size: 16px;
    }

    #mainContainer {
      width: 608px;
      min-height: 539px;
      border: 1px solid #000;
      padding: 4px;
    }

    h2 {
      margin: 22px 0 24px;
      font-size: 25px;
      line-height: 1.1;
    }

    .intro {
      width: 580px;
      margin-bottom: 2px;
      font-size: 18px;
      line-height: 1.35;
    }

    .board {
      display: flex;
      gap: 90px;
      align-items: flex-start;
    }

    #capitals {
      width: 210px;
      min-height: 409px;
      padding: 4px;
      border: 1px solid #000;
      background: #e2ebed;
    }

    #capitals p {
      margin: 19px 0 17px;
      font-size: 17px;
    }

    #dropContent {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
      min-height: 330px;
    }

    #countries {
      display: grid;
      width: 250px;
      grid-template-columns: 121px 121px;
      gap: 5px 6px;
      padding-top: 2px;
    }

    .capital {
      width: 103px;
      min-height: 42px;
      border: 1px solid #000;
      padding: 10px 6px;
      background: #fff;
      font-weight: 700;
      font-size: 16px;
      line-height: 20px;
      text-align: center;
      cursor: grab;
      user-select: none;
    }

    .capital:active {
      cursor: grabbing;
    }

    .country {
      width: 121px;
      height: 77px;
      border: 1px solid #000;
      padding: 8px 5px;
      background: #e2ebed;
      font-weight: 700;
      font-size: 16px;
      line-height: 19px;
      text-align: center;
      transition: background-color 120ms ease;
    }

    .country.drag-over,
    #capitals.drag-over {
      background: #d4e7ef;
      outline: 2px dashed #2f6f8f;
      outline-offset: -4px;
    }

    .country .capital {
      width: 100%;
      min-height: 32px;
      margin-top: 9px;
      padding: 5px 4px;
      font-size: 14px;
      line-height: 18px;
    }

    .capital.correct {
      background: #70ef70;
    }

    .capital.wrong {
      background: #ffd9d9;
    }

    .country:nth-child(7) {
      grid-column: 1;
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      #mainContainer {
        width: 100%;
        min-height: 100vh;
      }

      .intro {
        width: auto;
      }

      .board {
        flex-wrap: wrap;
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <main id="mainContainer">
    <h2>Drag and drop - demo 3</h2>
    <div class="intro">
      "drag'n drop applications".
    </div>

    <div class="board">
      <section id="capitals" class="drop-zone" aria-label="Capitals">
        <p><b>Capitals</b></p>
        <div id="dropContent">
          <div class="capital" id="oslo" data-country="Norway">Oslo</div>
          <div class="capital" id="stockholm" data-country="Sweden">Stockholm</div>
          <div class="capital" id="washington" data-country="United States">Washington</div>
          <div class="capital" id="copenhagen" data-country="Denmark">Copenhagen</div>
          <div class="capital" id="seoul" data-country="South Korea">Seoul</div>
          <div class="capital" id="rome" data-country="Italy">Rome</div>
          <div class="capital" id="madrid" data-country="Spain">Madrid</div>
        </div>
      </section>

      <section id="countries" aria-label="Countries">
        <div class="country drop-zone" data-country="Italy">Italy</div>
        <div class="country drop-zone" data-country="Spain">Spain</div>
        <div class="country drop-zone" data-country="Norway">Norway</div>
        <div class="country drop-zone" data-country="Denmark">Denmark</div>
        <div class="country drop-zone" data-country="South Korea">South Korea</div>
        <div class="country drop-zone" data-country="Sweden">Sweden</div>
        <div class="country drop-zone" data-country="United States">United States</div>
      </section>
    </div>
  </main>

  <script>
    const capitalsHome = document.getElementById('dropContent');
    const dragItems = document.querySelectorAll('.capital');
    const dropZones = document.querySelectorAll('.drop-zone');
    let currentDrag = null;

    function resetCapitalStyle(capital) {
      capital.classList.remove('correct', 'wrong');
    }

    function returnExistingCapital(countryBox) {
      const existingCapital = countryBox.querySelector('.capital');

      if (existingCapital) {
        resetCapitalStyle(existingCapital);
        capitalsHome.appendChild(existingCapital);
      }
    }

    function moveCapitalToZone(capital, zone) {
      if (zone.id === 'capitals') {
        resetCapitalStyle(capital);
        capitalsHome.appendChild(capital);
        return;
      }

      returnExistingCapital(zone);
      zone.appendChild(capital);

      const isCorrect = capital.dataset.country === zone.dataset.country;
      capital.classList.toggle('correct', isCorrect);
      capital.classList.toggle('wrong', !isCorrect);
    }

    function clearDropHighlights() {
      dropZones.forEach((zone) => zone.classList.remove('drag-over'));
    }

    function findDropZoneAtPoint(x, y, draggedItem) {
      draggedItem.style.visibility = 'hidden';
      const target = document.elementFromPoint(x, y);
      draggedItem.style.visibility = '';
      return target ? target.closest('.drop-zone') : null;
    }

    function updatePointerDrag(event) {
      if (!currentDrag) {
        return;
      }

      event.preventDefault();
      const { item, offsetX, offsetY } = currentDrag;
      item.style.left = `${event.clientX - offsetX}px`;
      item.style.top = `${event.clientY - offsetY}px`;

      clearDropHighlights();
      const dropZone = findDropZoneAtPoint(event.clientX, event.clientY, item);
      if (dropZone) {
        dropZone.classList.add('drag-over');
      }
    }

    function finishPointerDrag(event) {
      if (!currentDrag) {
        return;
      }

      const { item, sourceParent } = currentDrag;
      const dropZone = findDropZoneAtPoint(event.clientX, event.clientY, item);

      if (item.hasPointerCapture(event.pointerId)) {
        item.releasePointerCapture(event.pointerId);
      }
      item.style.position = '';
      item.style.left = '';
      item.style.top = '';
      item.style.width = '';
      item.style.zIndex = '';
      item.style.pointerEvents = '';
      item.classList.remove('dragging');
      clearDropHighlights();

      if (dropZone) {
        moveCapitalToZone(item, dropZone);
      } else {
        sourceParent.appendChild(item);
      }

      currentDrag = null;
    }

    dragItems.forEach((item) => {
      item.addEventListener('pointerdown', (event) => {
        const rect = item.getBoundingClientRect();
        currentDrag = {
          item,
          sourceParent: item.parentElement,
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top
        };

        item.setPointerCapture(event.pointerId);
        item.style.width = `${rect.width}px`;
        item.style.position = 'fixed';
        item.style.left = `${rect.left}px`;
        item.style.top = `${rect.top}px`;
        item.style.zIndex = '10';
        item.style.pointerEvents = 'none';
        item.classList.add('dragging');
      });

      item.addEventListener('pointermove', updatePointerDrag);
      item.addEventListener('pointerup', finishPointerDrag);
      item.addEventListener('pointercancel', finishPointerDrag);
    });

    document.addEventListener('pointermove', updatePointerDrag);
    document.addEventListener('pointerup', finishPointerDrag);
    document.addEventListener('pointercancel', finishPointerDrag);

    dropZones.forEach((zone) => {
      zone.addEventListener('dragover', (event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';
        zone.classList.add('drag-over');
      });

      zone.addEventListener('dragleave', () => {
        zone.classList.remove('drag-over');
      });

      zone.addEventListener('drop', (event) => {
        event.preventDefault();
        zone.classList.remove('drag-over');

        const draggedItem = document.querySelector('.dragging');
        if (!draggedItem) {
          return;
        }
        moveCapitalToZone(draggedItem, zone);
      });
    });
  </script>
</body>
</html>
